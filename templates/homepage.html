<!DOCTYPE html>
<html>
    <head>
        <title>Phased</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='homepage.css') }}">
    </head>
    <body>
        <div class="header">
            <h3>Hi {{ name }}!</h3>
            <div class="head_buttons">
                <a href="/foodlog"><button>+</button></a>
                <a href="/settings"><button>:</button></a>
            </div>
        </div>

        <div class="main">
            <div class="phase_info">
                <div class="circle">
                    <p>{{ phase }}</p>
                </div>
                <div class="descrip">
                    <p>{{ descriptions }}</p>
                </div>
            </div>
            <div class="calorie_intake">
                <div class="circle">
                    <p>Remaining Calories:</p>
                    <div class="number">
                        <p>{{ calories }} kcal</p>
                    </div>
                </div>
                <div class="descrip">
                    <p>Macros Report</p>
                </div>
            </div>
        </div>
    </body>
</html>
