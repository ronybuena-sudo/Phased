<!DOCTYPE html>
<html>
    <head>
        <title>Phased</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    </head>
    <body> 
        <a href="/homepage"><button class="back_button">Back to Home</button></a>
        <div class="container">
            <div class="glow"></div>
            <form method="POST" action="/foodlog">
                <div class="recipe_maker">
                    <h2>Had a good meal? Let's track it!</h2>
                    <div>
                        <input type="text" id="food_name" name="food_name" placeholder="Food Name">
                    </div>
                    <div>
                        <input type="number" id="calories" name="calories" placeholder="Calorie Count">
                    </div>
                    <div>
                        <input type="number" id="protein" name="protein" placeholder="Protein (g)">
                    </div>
                    <div>
                        <input type="number" id="carbs" name="carbs" placeholder="Carbs (g)">
                    </div>
                    <div>
                        <input type="number" id="fat" name="fat" placeholder="Fat (g)">
                    </div>
                    <button type="submit">Log Food</button>
                </div>

                <div class="food_history">
                    {% for food in food_history %}
                    <form method="POST" action="/foodlog">
                        <input type="hidden" name="food_name" value="{{ food.name }}">
                        <input type="hidden" name="calories" value="{{ food.calories }}">
                        <button type="submit">{{ food.name }} — {{ food.calories }} kcal</button>
                    </form>
                    {% endfor %}
                </div>
            </form>
        </div>
    </body>
</html>
